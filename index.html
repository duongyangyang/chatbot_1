<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Trợ lý AI">
<title>Trợ lý AI</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --surface:  #1a1a1a;
    --border:   #2a2a2a;
    --accent:   #4f8ef7;
    --accent2:  #2563eb;
    --text:     #e8e8e8;
    --muted:    #666;
    --bubble-me: #1d3a6e;
    --bubble-ai: #1e1e1e;
    --radius:   14px;
    --font:     'Inter', system-ui, sans-serif;
  }

  html {
    height: -webkit-fill-available;
  }
  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
  }

  input, textarea, select, button {
    -webkit-user-select: text;
    user-select: text;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 680px;
    margin: 0 auto;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .header-info { flex: 1; }
  .header-name { font-weight: 500; font-size: 15px; }
  .header-status { font-size: 12px; color: var(--muted); }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 4px;
    vertical-align: middle;
  }

  #notif-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    padding: 6px 10px; font-size: 12px;
    cursor: pointer; transition: all .2s;
    font-family: var(--font);
    -webkit-user-select: none;
    user-select: none;
  }
  #notif-btn:hover { border-color: var(--accent); color: var(--accent); }
  #notif-btn.enabled { border-color: #22c55e; color: #22c55e; }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 8px;
    max-width: 85%;
  }
  .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.ai { align-self: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-row.me .bubble {
    background: var(--bubble-me);
    border-bottom-right-radius: 4px;
    color: #d6e4ff;
  }

  .msg-row.ai .bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    text-align: right;
    -webkit-user-select: none;
    user-select: none;
  }
  .msg-row.ai .msg-time { text-align: left; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 12px 14px; align-items: center; }
  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Date divider */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin: 8px 0;
    position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  /* Input */
  #input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    resize: none;
    outline: none;
    max-height: 120px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    line-height: 1.5;
    transition: border-color .2s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .2s, transform .1s;
    -webkit-user-select: none;
    user-select: none;
  }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:active { transform: scale(.93); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }

  #send-btn svg { width: 18px; height: 18px; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e1e1e;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    padding: 40px;
    text-align: center;
  }
  #empty .big { font-size: 40px; }
  #empty h2 { font-size: 16px; font-weight: 500; color: var(--text); }
  #empty p { font-size: 13px; line-height: 1.6; }

  .suggestion-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    .typing span { animation: none; }
  }

  @supports (padding: max(0px)) {
    body { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="avatar">🤖</div>
    <div class="header-info">
      <div class="header-name">Trợ lý AI</div>
      <div class="header-status"><span class="status-dot"></span>Đang hoạt động</div>
    </div>
    <button id="notif-btn" onclick="toggleNotification()">🔔 Thông báo</button>
  </header>

  <div id="messages">
    <div id="empty">
      <div class="big">👋</div>
      <h2>Xin chào! Tôi là trợ lý AI của bạn</h2>
      <p>Hỏi bất cứ điều gì, đặt lịch,<br>nhắc nhở, hoặc chỉ tâm sự thôi cũng được.</p>
      <div class="suggestion-chips">
        <div class="chip" onclick="sendSuggestion('Hôm nay tôi cần làm gì?')">📋 Việc hôm nay</div>
        <div class="chip" onclick="sendSuggestion('Nhắc tôi lúc 3h chiều họp')">⏰ Đặt nhắc nhở</div>
        <div class="chip" onclick="sendSuggestion('Tóm tắt tin tức hôm nay')">📰 Tin tức</div>
        <div class="chip" onclick="sendSuggestion('Tâm sự chút đi')">💬 Tâm sự</div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Nhắn gì đó..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Gửi">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
const API_URL = '/chat';
let isTyping = false;
let swRegistration = null;
let hasMessages = false;

// Prevent default zoom on input focus
document.addEventListener('touchstart', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    e.target.style.fontSize = '16px';
  }
}, { passive: true });

// Auto resize textarea
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Enter to send, Shift+Enter for newline
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function now() {
  return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
}

function showEmpty(show) {
  document.getElementById('empty').style.display = show ? 'flex' : 'none';
}

function appendMessage(role, text) {
  if (!hasMessages) { showEmpty(false); hasMessages = true; }

  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'ai') {
    row.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div>
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div>
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
  }

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function showTyping() {
  if (isTyping) return;
  isTyping = true;
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing-indicator';
  row.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="bubble typing">
      <span></span><span></span><span></span>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  isTyping = false;
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isTyping) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMessage('me', text);
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    hideTyping();
    appendMessage('ai', data.reply || 'Xin lỗi, có lỗi xảy ra.');
  } catch (err) {
    hideTyping();
    appendMessage('ai', '⚠️ Không kết nối được server. Thử lại nhé.');
  } finally {
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function sendSuggestion(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

// Push Notification
async function toggleNotification() {
  const btn = document.getElementById('notif-btn');

  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    showToast('Trình duyệt không hỗ trợ thông báo');
    return;
  }

  if (Notification.permission === 'granted') {
    showToast('Thông báo đã được bật ✓');
    btn.className = 'enabled';
    btn.textContent = '🔔 Đã bật';
    return;
  }

  const permission = await Notification.requestPermission();
  if (permission === 'granted') {
    btn.className = 'enabled';
    btn.textContent = '🔔 Đã bật';
    showToast('Đã bật thông báo!');
    subscribeToNotifications();
  } else {
    showToast('Bạn đã tắt thông báo trong trình duyệt');
  }
}

async function subscribeToNotifications() {
  try {
    swRegistration = await navigator.serviceWorker.ready;
    const subscription = await swRegistration.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(window.VAPID_PUBLIC_KEY || '')
    });
    await fetch('/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(subscription)
    });
  } catch (e) {
    console.log('Push subscription error:', e);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return new Uint8Array([...rawData].map(c => c.charCodeAt(0)));
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    swRegistration = reg;
    if (Notification.permission === 'granted') {
      document.getElementById('notif-btn').className = 'enabled';
      document.getElementById('notif-btn').textContent = '🔔 Đã bật';
    }
  });
}
</script>
</body>
</html>
