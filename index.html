<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Thư ký Kim">
<title>Thư ký Kim</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --surface:  #1a1a1a;
    --border:   #2a2a2a;
    --accent:   #4f8ef7;
    --accent2:  #2563eb;
    --text:     #e8e8e8;
    --muted:    #666;
    --bubble-me: #1d3a6e;
    --bubble-ai: #1e1e1e;
    --radius:   14px;
    --font:     'Inter', system-ui, sans-serif;
  }

  html {
    height: -webkit-fill-available;
  }
  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
  }

  input, textarea, select, button {
    -webkit-user-select: text;
    user-select: text;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 680px;
    margin: 0 auto;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .header-info { flex: 1; }
  .header-name { font-weight: 500; font-size: 15px; }
  .header-status { font-size: 12px; color: var(--muted); }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 4px;
    vertical-align: middle;
  }

  #notif-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    padding: 6px 10px; font-size: 12px;
    cursor: pointer; transition: all .2s;
    font-family: var(--font);
    -webkit-user-select: none;
    user-select: none;
  }
  #notif-btn:hover { border-color: var(--accent); color: var(--accent); }
  #notif-btn.enabled { border-color: #22c55e; color: #22c55e; }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 8px;
    max-width: 85%;
  }
  .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.ai { align-self: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-row.me .bubble {
    background: var(--bubble-me);
    border-bottom-right-radius: 4px;
    color: #d6e4ff;
  }

  .msg-row.ai .bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    text-align: right;
    -webkit-user-select: none;
    user-select: none;
  }
  .msg-row.ai .msg-time { text-align: left; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 12px 14px; align-items: center; }
  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Date divider */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin: 8px 0;
    position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  /* Input */
  #input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    resize: none;
    outline: none;
    max-height: 120px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    line-height: 1.5;
    transition: border-color .2s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .2s, transform .1s;
    -webkit-user-select: none;
    user-select: none;
  }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:active { transform: scale(.93); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }

  #send-btn svg { width: 18px; height: 18px; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e1e1e;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    padding: 40px;
    text-align: center;
  }
  #empty .big { font-size: 40px; }
  #empty h2 { font-size: 16px; font-weight: 500; color: var(--text); }
  #empty p { font-size: 13px; line-height: 1.6; }

  .suggestion-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* Schedule card (Morning Planning approval) */
  .schedule-card {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    overflow: hidden;
  }
  .sched-header { font-size: 13px; font-weight: 500; padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .sched-slots { display: flex; flex-direction: column; }
  .slot { display: flex; gap: 10px; padding: 7px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .slot:last-child { border-bottom: none; }
  .slot-time { color: var(--accent); font-variant-numeric: tabular-nums; min-width: 48px; flex-shrink: 0; }
  .slot-title { color: var(--text); }
  .sched-actions { display: flex; gap: 8px; padding: 8px 12px; }
  .sched-btn {
    flex: 1; border: 1px solid var(--border); background: var(--bg);
    color: var(--text); border-radius: 8px; padding: 8px; font-size: 13px;
    font-family: var(--font); cursor: pointer; transition: all .2s;
    -webkit-user-select: none; user-select: none;
  }
  .sched-btn.approve { border-color: #22c55e; color: #22c55e; }
  .sched-btn.approve:active { background: #22c55e22; }
  .sched-btn.edit { border-color: var(--accent); color: var(--accent); }
  .sched-btn.edit:active { background: var(--accent); }
  .sched-approved { padding: 8px 12px; font-size: 12px; color: #22c55e; }

  /* Pending report card (proactive reviews/planning) */
  .pending-card {
    margin-top: 10px; border: 1px solid var(--accent); border-left-width: 3px;
    border-radius: 10px; background: var(--bg); padding: 10px 12px;
  }
  .pending-head { font-size: 12px; color: var(--accent); margin-bottom: 6px; }
  .pending-body { font-size: 13px; white-space: pre-wrap; }
  .pending-dismiss {
    margin-top: 8px; font-size: 12px; color: var(--muted); background: none;
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
    cursor: pointer; font-family: var(--font);
  }

  /* Markdown trong bubble AI */
  .bubble p { margin: 0; }
  .md-h { font-weight: 600; margin: 8px 0 4px; }
  .md-h1 { font-size: 16px; } .md-h2 { font-size: 15px; } .md-h3 { font-size: 14px; }
  .md-ul, .md-ol { margin: 4px 0; padding-left: 20px; }
  .md-ul { list-style: disc; } .md-ol { list-style: decimal; }
  .md-ul li, .md-ol li { margin: 2px 0; }
  .md-icode { background: #0a0a0a; border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: ui-monospace,Menlo,monospace; font-size: 12px; }
  .md-code { background: #0a0a0a; border: 1px solid var(--border); border-radius: 8px; padding: 10px; overflow-x: auto; margin: 6px 0; }
  .md-code code { font-family: ui-monospace,Menlo,monospace; font-size: 12px; white-space: pre; color: #d6e4ff; }
  .md-table { width: 100%; border-collapse: collapse; margin: 12px 0; overflow-x: auto; }
  .md-table.cols-3 { font-size: 13px; }
  .md-table.cols-5 { font-size: 10px; }
  .md-table.cols-6plus { font-size: 8px; }
  .md-table th, .md-table td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
  .md-table th { background: var(--surface); font-weight: 500; }
  .md-table tr:hover { background: rgba(79, 142, 247, 0.05); }
  .bubble a { color: var(--accent); }

  /* Trace (thinking + tool calls) */
  .trace { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .trace-wrap { margin-top: 8px; margin-bottom: 14px; background: #141414; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; }
  .trace-wrap > summary { cursor: pointer; padding: 6px 8px; list-style: none; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .trace-wrap > summary::-webkit-details-marker { display: none; }
  .trace-wrap > summary::before { content: '▸'; font-size: 10px; }
  .trace-wrap[open] > summary::before { content: '▾'; }
  .trace-wrap .trace { margin: 0 8px 8px; }
  .trace-thought { font-size: 12px; color: var(--muted); font-style: italic; background: #141414; border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; white-space: pre-wrap; }
  .trace-tool { background: #141414; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; }
  .trace-tool summary { cursor: pointer; padding: 6px 8px; list-style: none; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .trace-tool summary::-webkit-details-marker { display: none; }
  .trace-tool summary::before { content: '▸'; color: var(--muted); font-size: 10px; }
  .trace-tool[open] summary::before { content: '▾'; }
  .trace-args { color: var(--muted); font-family: ui-monospace,Menlo,monospace; font-size: 11px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
  .trace-result { margin: 0; padding: 8px; border-top: 1px solid var(--border); font-family: ui-monospace,Menlo,monospace; font-size: 11px; color: #b8e6c1; white-space: pre-wrap; word-break: break-word; max-height: 240px; overflow-y: auto; }

  @media (prefers-reduced-motion: reduce) {
    .typing span { animation: none; }
  }

  @supports (padding: max(0px)) {
    body { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
  }

  /* Settings modal */
  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  #settings-overlay.open { display: flex; }

  #settings-panel {
    background: #141414;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 680px;
    max-height: 90dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
  }
  #settings-panel::-webkit-scrollbar { width: 4px; }
  #settings-panel::-webkit-scrollbar-track { background: transparent; }
  #settings-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Drag handle */
  .settings-handle {
    width: 36px; height: 4px;
    background: #333;
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }

  /* Settings header */
  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    flex-shrink: 0;
  }
  .settings-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .settings-close-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #222;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .2s;
    line-height: 1;
    -webkit-user-select: none; user-select: none;
  }
  .settings-close-btn:hover { background: #2a2a2a; color: var(--text); }

  /* Settings sections */
  .settings-section {
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .settings-section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 4px;
    margin-bottom: 2px;
  }

  .settings-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 16px;
    flex-shrink: 0;
  }

  /* Form groups */
  .setting-group { display: flex; flex-direction: column; gap: 6px; }
  .setting-group label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 2px;
  }
  .setting-group input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  .setting-group input:focus { border-color: var(--accent); }
  .setting-group input::placeholder { color: #444; }

  .setting-row { display: flex; gap: 8px; align-items: stretch; }
  .setting-row input { flex: 1; }

  .setting-hint {
    font-size: 11px;
    color: #555;
    line-height: 1.5;
    padding: 0 2px;
  }

  /* Primary action */
  #settings-save {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    padding: 13px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    width: 100%;
  }
  #settings-save:hover { background: var(--accent2); }
  #settings-save:active { transform: scale(.98); }

  /* Settings footer (save + cancel inline) */
  .settings-footer {
    display: flex;
    gap: 10px;
    padding: 12px 16px max(16px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: #141414;
    flex-shrink: 0;
  }
  .settings-footer #settings-save { flex: 1; padding: 11px; font-size: 14px; border-radius: 10px; }
  #settings-cancel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 14px;
    padding: 11px 18px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    white-space: nowrap;
  }
  #settings-cancel:hover { border-color: #555; color: var(--text); }

  /* Mini buttons (Tạo, Copy, Tải config) */
  .setting-mini-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 12px;
    padding: 0 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color .2s, color .2s;
    flex-shrink: 0;
  }
  .setting-mini-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Action rows (Danger, Info actions) */
  .settings-action-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .2s;
    text-align: left;
    width: 100%;
    font-family: var(--font);
    color: var(--text);
    text-decoration: none;
  }
  .settings-action-icon {
    font-size: 18px;
    flex-shrink: 0;
    width: 32px;
    text-align: center;
  }
  .settings-action-content { display: flex; flex-direction: column; gap: 2px; }
  .settings-action-title { font-size: 14px; font-weight: 500; }
  .settings-action-desc { font-size: 11px; color: var(--muted); }
  .settings-action-row:hover { border-color: #555; }
  .settings-action-row.danger:hover { border-color: #ef4444; }
  .settings-action-row.danger:hover .settings-action-title { color: #ef4444; }
  .settings-action-row.danger:hover .settings-action-icon { filter: saturate(2); }
  #settings-reset-chat:disabled { opacity: .4; cursor: not-allowed; }

  /* Settings icon button in header */
  #settings-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    -webkit-user-select: none;
    user-select: none;
    transition: border-color .2s, color .2s;
  }
  #settings-btn:hover { border-color: var(--accent); color: var(--accent); }
  #settings-btn.configured { border-color: #22c55e; color: #22c55e; }

</style>
</head>
<body>
<div id="app">
  <header>
    <div class="avatar"><img src="/static/icon.jpg" alt="Thư ký Kim"></div>
    <div class="header-info">
      <div class="header-name">Thư ký Kim</div>
      <div class="header-status"><span class="status-dot"></span>Đang hoạt động</div>
    </div>
    <button id="settings-btn" onclick="openSettings()" title="Cài đặt">⚙️</button>
    <button id="notif-btn" onclick="toggleNotification()">🔔</button>
  </header>

  <div id="messages">
    <div id="empty">
      <div class="big">👋</div>
      <h2>Xin chào! Tôi là Thư ký Kim aka Trợ lý AI của bạn</h2>
      <p id="empty-hint">Hỏi bất cứ điều gì, đặt lịch,<br>nhắc nhở, hoặc chỉ tâm sự thôi cũng được.</p>
      <div class="suggestion-chips">
        <div class="chip" onclick="sendSuggestion('Hôm nay tôi cần làm gì?')">📋 Việc hôm nay</div>
        <div class="chip" onclick="sendSuggestion('Nhắc tôi lúc 3h chiều họp')">⏰ Đặt nhắc nhở</div>
        <div class="chip" onclick="sendSuggestion('Lên lịch cho ngày mai')">🗓️ Lên lịch ngày mai</div>
        <div class="chip" onclick="sendSuggestion('Tổng kết hôm nay')">📝 Tổng kết ngày</div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Nhắn gì đó..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Gửi">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
const API_URL = '/chat';
let isTyping = false;
let swRegistration = null;
let hasMessages = false;

// Prevent default zoom on input focus
document.addEventListener('touchstart', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    e.target.style.fontSize = '16px';
  }
}, { passive: true });

// Auto resize textarea
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Enter to send, Shift+Enter for newline
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function now() {
  return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
}

function showEmpty(show) {
  document.getElementById('empty').style.display = show ? 'flex' : 'none';
}

function appendMessage(role, text, extra) {
  if (!hasMessages) { showEmpty(false); hasMessages = true; }

  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  // Build bubble HTML. AI reply render markdown; ghép trace + schedule card.
  let bubbleHtml;
  if (role === 'ai') {
    bubbleHtml = '';
    if (extra && extra.trace) bubbleHtml += renderTrace(extra.trace);
    bubbleHtml += renderMarkdown(text);
    if (extra && extra.schedule) bubbleHtml += renderScheduleCard(extra.schedule);
  } else {
    bubbleHtml = escapeHtml(text);
  }

  if (role === 'ai') {
    row.innerHTML = `
      <div class="msg-avatar"><img src="/static/icon.jpg" alt="Kim" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
      <div>
        <div class="bubble">${bubbleHtml}</div>
        <div class="msg-time">${(extra && extra.time) || now()}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div>
        <div class="bubble">${bubbleHtml}</div>
        <div class="msg-time">${(extra && extra.time) || now()}</div>
      </div>`;
  }

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function renderScheduleCard(schedule) {
  const slots = schedule.slots || [];
  const sid = schedule.id;
  const date = escapeHtml(schedule.date || '');
  const slotHtml = slots.map(s =>
    `<div class="slot"><span class="slot-time">${escapeHtml(s.time||'')}</span><span class="slot-title">${escapeHtml(s.title||'')}</span></div>`
  ).join('');
  return `
    <div class="schedule-card" id="sched-${sid}">
      <div class="sched-header">📋 Lịch ngày ${date}</div>
      <div class="sched-slots">${slotHtml}</div>
      <div class="sched-actions">
        <button class="sched-btn approve" onclick="approveSchedule(${sid})">✅ Duyệt</button>
        <button class="sched-btn edit" onclick="editSchedule(${sid})">✏️ Sửa</button>
      </div>
    </div>`;
}

async function approveSchedule(sid) {
  try {
    const res = await fetch('/approve-schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ schedule_id: sid })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      const card = document.getElementById('sched-' + sid);
      if (card) {
        card.querySelectorAll('.sched-actions').forEach(a => a.remove());
        const tag = document.createElement('div');
        tag.className = 'sched-approved'; tag.textContent = '✓ Đã duyệt — đã tạo sự kiện + nhắc';
        card.appendChild(tag);
      }
      showToast('Đã duyệt lịch ✓');
    } else if (data.needs_regen) {
      showToast('Hãy gửi yêu cầu sửa lại');
    } else {
      showToast(data.error || 'Duyệt thất bại');
    }
  } catch (e) {
    showToast('Không kết nối được server');
  }
}

function editSchedule(sid) {
  const card = document.getElementById('sched-' + sid);
  const date = card ? (card.querySelector('.sched-header')?.textContent || '') : '';
  const input = document.getElementById('msg-input');
  input.value = `Sửa lịch ${date}: `;
  input.focus();
  autoResize(input);
}

function showTyping() {
  if (isTyping) return;
  isTyping = true;
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing-indicator';
  row.innerHTML = `
    <div class="msg-avatar"><img src="/static/icon.jpg" alt="Kim" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
    <div class="bubble typing">
      <span></span><span></span><span></span>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  isTyping = false;
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Markdown renderer (nhỏ, inline, không dep) cho bubble AI ────────────
function _escapeRaw(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function _mdInline(t){
  t = _escapeRaw(t);
  t = t.replace(/`([^`\n]+)`/g, '<code class="md-icode">$1</code>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function parseMarkdownTable(src) {
  const lines = String(src).split('\n');
  const tableStart = lines.findIndex(l => l.includes('|'));
  if (tableStart === -1) return src;

  const tableLines = [];
  let i = tableStart;
  while (i < lines.length && lines[i].includes('|')) {
    tableLines.push(lines[i]);
    i++;
  }

  if (tableLines.length < 2) return src;

  const headerCells = tableLines[0].split('|').map(c => c.trim()).filter(c => c);
  const sepLine = tableLines[1];

  if (!/^[\s|:\-]+$/.test(sepLine)) return src;

  const colCount = headerCells.length;
  let colClass = 'cols-3';
  if (colCount <= 3) colClass = 'cols-3';
  else if (colCount <= 5) colClass = 'cols-5';
  else colClass = 'cols-6plus';

  let html = `<table class="md-table ${colClass}"><thead><tr>`;
  for (const h of headerCells) {
    html += '<th>' + _mdInline(h) + '</th>';
  }
  html += '</tr></thead><tbody>';

  for (let j = 2; j < tableLines.length; j++) {
    const rowCells = tableLines[j].split('|').map(c => c.trim()).filter(c => c);
    if (rowCells.length === 0) continue;
    html += '<tr>';
    for (const cell of rowCells) {
      html += '<td>' + _mdInline(cell) + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';

  const beforeTable = lines.slice(0, tableStart).join('\n');
  const afterTable = lines.slice(i).join('\n');
  return beforeTable + '\n' + html + '\n' + afterTable;
}

function renderMarkdown(src){
  if(!src) return '';
  src = parseMarkdownTable(src);
  // 1) tách code block ra placeholder (xử lý đa dòng nguyên khối)
  const blocks = [];
  let s = String(src).replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    blocks.push('<pre class="md-code"><code>' + _escapeRaw(code.replace(/\n$/, '')) + '</code></pre>');
    return '@@BLK' + (blocks.length - 1) + '@@';
  });
  // 2) xử lý từng dòng
  const lines = s.split('\n');
  let html = '', inUL = false, inOL = false;
  const closeLists = () => { if(inUL){ html += '</ul>'; inUL=false; } if(inOL){ html += '</ol>'; inOL=false; } };
  for(const line of lines){
    if(/^@@BLK\d+@@$/.test(line.trim())){ closeLists(); html += line.trim(); continue; }
    if(/^<table/.test(line.trim())){ closeLists(); html += line; continue; }
    if(/^<\/table>/.test(line.trim())){ html += line; continue; }
    if(/^<thead>|^<tbody>|^<\/thead>|^<\/tbody>|^<tr|^<\/tr|^<th|^<td/.test(line.trim())){ html += line; continue; }
    let m;
    if((m = line.match(/^(#{1,3})\s+(.*)/))){ closeLists(); const lvl=m[1].length; html += '<div class="md-h md-h'+lvl+'">'+_mdInline(m[2])+'</div>'; continue; }
    if((m = line.match(/^\s*[-*]\s+(.*)/))){ if(!inUL){ closeLists(); html+='<ul class="md-ul">'; inUL=true; } html += '<li>'+_mdInline(m[1])+'</li>'; continue; }
    if((m = line.match(/^\s*\d+\.\s+(.*)/))){ if(!inOL){ closeLists(); html+='<ol class="md-ol">'; inOL=true; } html += '<li>'+_mdInline(m[1])+'</li>'; continue; }
    if(line.trim()===''){ closeLists(); html += '<br>'; continue; }
    closeLists(); html += _mdInline(line) + '<br>';
  }
  closeLists();
  html = html.replace(/@@BLK(\d+)@@/g, (m,i) => blocks[+i]);
  return html;
}

// ── Trace: hiển thị thinking + tool calls (giống Claude/Codex) ───────────
function renderTrace(trace){
  if(!trace || !trace.length) return '';
  let html = '<details class="trace-wrap"><summary> REASONING &amp; TOOLS DETAILED</summary><div class="trace">';
  for(const s of trace){
    if(s.kind === 'thought' && s.text){
      html += '<div class="trace-thought">💭 ' + _escapeRaw(s.text) + '</div>';
    } else if(s.kind === 'tool'){
      const args = s.args ? (() => { try { return JSON.stringify(JSON.parse(s.args)); } catch(e){ return s.args; } })() : '';
      html += '<details class="trace-tool"><summary>🔧 <b>' + _escapeRaw(s.name) + '</b>'
              + (args ? '<span class="trace-args">' + _escapeRaw(args) + '</span>' : '') + '</summary>'
              + '<pre class="trace-result">' + _escapeRaw(s.result || '') + '</pre></details>';
    }
  }
  html += '</div></details>';
  return html;
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isTyping) return;

  if (!isConfigured()) {
    openSettings();
    showToast('Vui lòng điền thông tin kết nối trước nhé');
    return;
  }

  const cfg = loadSettings();
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMessage('me', text);
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message:  text,
        api_key:  cfg.apiKey,
        base_url: cfg.baseUrl,
        model:    cfg.model,
      })
    });
    const data = await res.json();
    hideTyping();
    appendMessage('ai', data.reply || 'Xin lỗi, có lỗi xảy ra.',
      { schedule: data.schedule || null, trace: data.trace || null });
  } catch (err) {
    hideTyping();
    appendMessage('ai', '⚠️ Không kết nối được server. Thử lại nhé.');
  } finally {
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function sendSuggestion(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

// Push Notification
async function getVapidPublicKey() {
  if (window.VAPID_PUBLIC_KEY) return window.VAPID_PUBLIC_KEY;
  try {
    const res = await fetch('/vapid-public-key');
    const data = await res.json();
    window.VAPID_PUBLIC_KEY = data.publicKey || '';
  } catch (e) {
    console.log('Fetch VAPID public key error:', e);
    window.VAPID_PUBLIC_KEY = '';
  }
  return window.VAPID_PUBLIC_KEY;
}

// iOS: Web Push chỉ khả dụng khi app được "Add to Home Screen" (chế độ standalone)
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
}

async function toggleNotification() {
  const btn = document.getElementById('notif-btn');

  if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) {
    showToast('Trình duyệt không hỗ trợ thông báo');
    return;
  }

  // iOS (Safari) chỉ cho push khi đã cài app ra màn hình
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) || /Mac/.test(navigator.platform);
  if (isIOS && !isStandalone()) {
    showToast('Cài app ra màn hình: Share → Add to Home Screen');
    return;
  }

  // Chưa có quyền → xin quyền (iOS bắt buộc từ cử chỉ người dùng)
  if (Notification.permission !== 'granted') {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      showToast('Bạn đã tắt thông báo trong trình duyệt');
      return;
    }
  }

  // Đã có quyền → đăng ký subscription. Chỉ bật nút xanh khi thành công.
  const ok = await subscribeToNotifications();
  if (ok) {
    setNotifBtn(true);
    showToast('Đã bật thông báo ✓');
  }
}

function setNotifBtn(on) {
  const btn = document.getElementById('notif-btn');
  if (on) { btn.className = 'enabled'; btn.textContent = '🔔 ON'; }
  else    { btn.className = '';          btn.textContent = '🔔 OFF'; }
}

async function subscribeToNotifications() {
  const key = await getVapidPublicKey();
  if (!key) {
    showToast('Không lấy được VAPID key. Mở /debug-push trên server để kiểm tra.');
    return false;
  }
  try {
    swRegistration = await navigator.serviceWorker.ready;
    // Đã có subscription cũ → dùng lại thay vì tạo mới
    let subscription = await swRegistration.pushManager.getSubscription();
    if (!subscription) {
      subscription = await swRegistration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(key)
      });
    }
    const res = await fetch('/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(subscription)
    });
    if (!res.ok) throw new Error('server trả ' + res.status + ' khi đăng ký');
    return true;
  } catch (e) {
    console.log('Push subscription error:', e);
    const msg = String(e && e.message || e);
    showToast('Đăng ký thất bại: ' + msg);
    return false;
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return new Uint8Array([...rawData].map(c => c.charCodeAt(0)));
}

// Register service worker + đảm bảo subscribe lại nếu đã được cấp quyền từ trước
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(async reg => {
    swRegistration = reg;
    if (Notification.permission === 'granted' && isStandalone()) {
      // Chỉ bật nút xanh khi đăng ký subscription thành công
      const ok = await subscribeToNotifications();
      if (ok) setNotifBtn(true);
    }
  });
}

// Tải lịch sử chat từ server (SQLite) khi mở app — không mất khi restart.
async function loadHistory() {
  try {
    const res = await fetch('/history');
    const data = await res.json();
    const items = data.items || [];
    if (!items.length) return;
    showEmpty(false); hasMessages = true;
    for (const it of items) {
      const role = it.role === 'assistant' ? 'ai' : 'me';
      let time = '';
      try { time = new Date(it.created_at).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }); }
      catch (e) {}
      appendMessage(role, it.content || '', time ? { time } : undefined);
    }
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  } catch (e) {
    console.log('loadHistory error:', e);
  }
}
loadHistory();

// Tải báo cáo/tổng kết đang chờ (proactive jobs) khi mở app
loadPending();

// ── Settings ──────────────────────────────────────────────────────────
function loadSettings() {
  return {
    baseUrl: localStorage.getItem('cfg_baseurl') || '',
    apiKey:  localStorage.getItem('cfg_apikey')  || '',
    model:   localStorage.getItem('cfg_model')   || '',
  };
}

function isConfigured() {
  const c = loadSettings();
  return c.apiKey.trim() !== '';
}

function openSettings() {
  const c = loadSettings();
  document.getElementById('cfg-baseurl').value = c.baseUrl;
  document.getElementById('cfg-apikey').value  = c.apiKey;
  document.getElementById('cfg-model').value   = c.model;
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
}

async function saveSettings() {
  const baseUrl = document.getElementById('cfg-baseurl').value.trim();
  const apiKey  = document.getElementById('cfg-apikey').value.trim();
  const model   = document.getElementById('cfg-model').value.trim();

  if (!apiKey) { showToast('Vui lòng nhập API Key'); return; }

  localStorage.setItem('cfg_baseurl', baseUrl);
  localStorage.setItem('cfg_apikey',  apiKey);
  localStorage.setItem('cfg_model',   model);

  document.getElementById('settings-btn').classList.add('configured');
  showToast('Đã lưu cài đặt ✓');
  closeSettings();
}

async function loadServerConfig(show = true) {
  try {
    const res = await fetch('/config');
    if (!res.ok) throw new Error('server trả ' + res.status);
    const data = await res.json();
    if (data.base_url) {
      localStorage.setItem('cfg_baseurl', data.base_url);
      const el = document.getElementById('cfg-baseurl'); if (el) el.value = data.base_url;
    }
    if (data.model) {
      localStorage.setItem('cfg_model', data.model);
      const el = document.getElementById('cfg-model'); if (el) el.value = data.model;
    }
    if (show) showToast('Đã tải config từ server. API Key cần nhập trên thiết bị này.');
  } catch (e) {
    console.log('loadServerConfig error:', e);
    if (show) showToast('Không tải được config server');
  }
}

async function checkConfigOnStart() {
  if (isConfigured()) {
    document.getElementById('settings-btn').classList.add('configured');
  }
}
checkConfigOnStart();

// Reset đoạn chat: xoá lịch sử trên server + xoá tin nhắn trên màn hình.
async function resetChat() {
  const btn = document.getElementById('settings-reset-chat');
  if (!confirm('Xoá toàn bộ đoạn chat? Hành động không thể hoàn tác.')) return;
  btn.disabled = true;
  try {
    const res = await fetch('/reset-chat', { method: 'POST' });
    if (res.ok) {
      document.getElementById('messages').innerHTML = '';
      hasMessages = false;
      showEmpty(true);
      closeSettings();
      showToast('Đã xoá đoạn chat ✓');
    } else {
      showToast('Xoá thất bại');
    }
  } catch (e) {
    console.log('resetChat error:', e);
    showToast('Không kết nối được server');
  } finally {
    btn.disabled = false;
  }
}

// ── Pending reports (proactive reviews/planning) ───────────────────────
const PENDING_LABEL = {
  morning_planning: '📋 Lịch ngày',
  daily_review: '📝 Tổng kết ngày',
  weekly_review: '📅 Tổng kết tuần',
  monthly_review: '🗓️ Tổng kết tháng',
};

async function loadPending() {
  try {
    const res = await fetch('/pending');
    const data = await res.json();
    const items = data.items || [];
    if (!items.length) return;
    showEmpty(false); hasMessages = true;
    items.reverse().forEach(it => renderPending(it));
  } catch (e) {
    console.log('loadPending error:', e);

  }
}

function renderPending(it) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.dataset.pendingId = it.id;
  const label = PENDING_LABEL[it.type] || 'Thư ký Kim';
  let inner = `<div class="pending-card">
    <div class="pending-head">${label} ${escapeHtml(it.period || '')}</div>
    <div class="pending-body">${escapeHtml(it.content || '')}</div>`;
  // Nếu là morning_planning có slots → render schedule card (chưa duyệt).
  if (it.type === 'morning_planning' && it.schedule_id && it.schedule_slots) {
    inner += renderScheduleCard({id: it.schedule_id, date: it.period, slots: it.schedule_slots});
  }
  inner += `<div><button class="pending-dismiss" onclick="dismissPending(${it.id})">Đã xem</button></div></div>`;
  row.innerHTML = `
    <div class="msg-avatar"><img src="/static/icon.jpg" alt="Kim" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
    <div><div class="bubble">${inner}</div><div class="msg-time">${now()}</div></div>`;
  msgs.insertBefore(row, msgs.firstChild);
  msgs.scrollTop = msgs.scrollHeight;
}

async function dismissPending(id) {
  try {
    await fetch('/pending/read', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    const el = document.querySelector(`[data-pending-id="${id}"]`);
    if (el) el.remove();
  } catch (e) { console.log('dismiss error:', e); }
}

// Keep-alive: ping server mỗi 5 phút để không bị tắt
setInterval(() => {
  fetch('/ping').catch(() => {})
}, 300000)

</script>
