<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thư ký Kim">
<title>Thư ký Kim</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --surface:  #1a1a1a;
    --border:   #2a2a2a;
    --accent:   #4f8ef7;
    --accent2:  #2563eb;
    --text:     #e8e8e8;
    --muted:    #666;
    --bubble-me: #1d3a6e;
    --bubble-ai: #1e1e1e;
    --radius:   14px;
    --font:     'Inter', system-ui, sans-serif;
  }

  html {
    height: -webkit-fill-available;
    background: var(--bg);
  }
  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
  }

  input, textarea, select, button {
    -webkit-user-select: text;
    user-select: text;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 680px;
    margin: 0 auto;
    background: var(--bg);
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    padding-top: max(10px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }

  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .header-info { flex: 1; min-width: 0; }
  .header-name { font-weight: 500; font-size: 15px; line-height: 1.2; }
  .header-status { font-size: 12px; color: var(--muted); line-height: 1.2; margin-top: 2px; }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 4px;
    vertical-align: middle;
  }

  .header-actions { display: flex; align-items: center; gap: 8px; }
  .header-icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .2s, color .2s, background .2s, transform .1s;
    -webkit-user-select: none; user-select: none;
  }
  .header-icon-btn svg {
    width: 19px; height: 19px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .header-icon-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,.1); }
  .header-icon-btn:active { transform: scale(.96); }
  .header-icon-btn.enabled, .header-icon-btn.configured { border-color: #22c55e; color: #22c55e; }

  /* Quick-action bar — nằm ngay trên thanh chat, ẩn khi bàn phím bật */
  .quick-actions {
    display: flex; gap: 8px; padding: 6px 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    border-top: 1px solid var(--border);
    scrollbar-width: none;
    transition: max-height .2s ease, opacity .2s ease, padding .2s ease;
    max-height: 60px;
    overflow-y: hidden;
  }
  .quick-actions.kb-hidden {
    max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0;
    pointer-events: none;
  }
  .quick-actions::-webkit-scrollbar { display: none; }
  .qa-btn {
    flex-shrink: 0; padding: 7px 12px; font-size: 13px; font-family: var(--font);
    border-radius: 18px; background: var(--bubble-ai); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; white-space: nowrap;
    transition: border-color .15s, transform .1s;
    -webkit-user-select: none; user-select: none;
  }
  .qa-btn:hover { border-color: var(--accent); }
  .qa-btn:active { transform: scale(.97); }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    padding-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 8px;
    max-width: 85%;
  }
  .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.ai { align-self: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-row.me .bubble {
    background: var(--bubble-me);
    border-bottom-right-radius: 4px;
    color: #d6e4ff;
  }

  .msg-row.ai .bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    text-align: right;
    -webkit-user-select: none;
    user-select: none;
  }
  .msg-row.ai .msg-time { text-align: left; }

  /* Per-message action buttons (copy / resend / edit / regenerate) */
  .msg-actions {
    display: flex; gap: 4px; margin-top: 3px; opacity: 0;
    transition: opacity .15s;
    -webkit-user-select: none; user-select: none;
  }
  .msg-row:hover .msg-actions { opacity: 1; }
  .msg-row.me .msg-actions { justify-content: flex-end; }
  .msg-act-btn {
    font-size: 13px; line-height: 1; padding: 4px 6px;
    border: none; background: transparent; color: var(--muted);
    cursor: pointer; border-radius: 6px; transition: background .15s, color .15s;
  }
  .msg-act-btn:hover { background: var(--border); color: var(--text); }
  .msg-row.ai:not(.can-regen) .regen-btn { display: none; }
  @media (hover: none) { .msg-actions { opacity: 1; } }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 12px 14px; align-items: center; }
  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Date divider */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin: 8px 0;
    position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  /* Input */
  #input-area {
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    padding: 10px 16px 0;
  }

  #msg-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    resize: none;
    outline: none;
    max-height: 120px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    line-height: 1.5;
    transition: border-color .2s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .2s, transform .1s;
    -webkit-user-select: none;
    user-select: none;
  }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:active { transform: scale(.93); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }

  #send-btn svg { width: 18px; height: 18px; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e1e1e;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    padding: 40px;
    text-align: center;
  }
  #empty .big { font-size: 0; line-height: 0; }
  #empty h2 { font-size: 16px; font-weight: 500; color: var(--text); }
  #empty p { font-size: 13px; line-height: 1.6; }

  .suggestion-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* Schedule card (Morning Planning approval) — flat, đọc như nội dung bubble thường */
  .schedule-card { margin-top: 8px; display: block; }
  .sched-header {
    font-size: 14px; font-weight: 600; color: var(--text);
    padding: 2px 0 6px; display: flex; align-items: center; gap: 6px;
  }
  .sched-slots { display: flex; flex-direction: column; gap: 2px; }
  .slot {
    display: flex; gap: 8px; padding: 4px 0; font-size: 14px;
    align-items: baseline; line-height: 1.4;
  }
  .slot-time {
    color: var(--muted); font-variant-numeric: tabular-nums;
    min-width: 48px; flex-shrink: 0; font-size: 13px; font-weight: 500;
  }
  .slot-title { color: var(--text); flex: 1; }
  .sched-actions { display: flex; gap: 8px; margin-top: 10px; }
  .sched-btn {
    flex: 1; border-radius: 10px; padding: 8px 10px; font-size: 13px; font-weight: 500;
    font-family: var(--font); cursor: pointer; transition: all .15s;
    -webkit-user-select: none; user-select: none; border: 1px solid;
  }
  .sched-btn.approve {
    border-color: rgba(34,197,94,.5); color: #4ade80;
    background: rgba(34,197,94,.08);
  }
  .sched-btn.approve:hover { background: rgba(34,197,94,.15); }
  .sched-btn.approve:active { background: rgba(34,197,94,.25); }
  .sched-btn.edit {
    border-color: rgba(79,142,247,.4); color: var(--accent);
    background: rgba(79,142,247,.06);
  }
  .sched-btn.edit:hover { background: rgba(79,142,247,.12); }
  .sched-approved { padding: 8px 0 0; font-size: 12px; color: #4ade80; display: flex; align-items: center; gap: 6px; }

  /* Pending report card (proactive reviews/planning) — flat, như một tin nhắn thường */
  .pending-card { display: block; }
  .pending-head {
    font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    color: var(--muted); padding: 0 0 6px; display: flex; align-items: center; gap: 6px;
  }
  .pending-body { font-size: 14px; white-space: normal; padding: 0; line-height: 1.6; }
  .pending-dismiss {
    display: inline-block; margin: 10px 0 0; font-size: 12px; color: var(--muted);
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 12px; cursor: pointer; font-family: var(--font);
    transition: border-color .2s, color .2s;
  }
  .pending-dismiss:hover { border-color: #555; color: var(--text); }

  /* Daily review form (interactive) — hiển thị như một tin nhắn chat thường trong bubble */
  .review-form { display: block; white-space: normal; }
  .review-head { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .review-greet { font-size: 14px; color: #bbb; margin-bottom: 10px; }
  .review-checklist { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .review-task {
    display: flex; gap: 8px; align-items: center; font-size: 14px;
    padding: 7px 8px; border-radius: 8px; background: rgba(255,255,255,.03);
    cursor: pointer; transition: background .15s;
    -webkit-user-select: none; user-select: none;
  }
  .review-task:hover:not(.done) { background: rgba(79,142,247,.08); }
  .review-task input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; flex-shrink: 0; cursor: pointer; margin: 0; }
  .review-task-text { flex: 1; line-height: 1.35; }
  .review-task.done { opacity: .5; }
  .review-task.done .review-task-text { text-decoration: line-through; }
  .review-other {
    width: 100%; box-sizing: border-box; min-height: 56px;
    background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); padding: 9px 11px; font-family: var(--font); font-size: 14px;
    resize: vertical; outline: none; transition: border-color .2s; margin-bottom: 10px;
  }
  .review-other:focus { border-color: rgba(79,142,247,.5); }
  .review-other::placeholder { color: var(--muted); }
  .review-submit {
    width: 100%; background: var(--accent); border: none; border-radius: 10px; color: #fff;
    padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font);
    transition: opacity .2s, transform .1s;
  }
  .review-submit:hover { opacity: .9; }
  .review-submit:active { transform: scale(.98); }

  /* Schedule slot edit (Morning Planning) */
  .slot.editing { flex-direction: column; gap: 4px; }
  .slot-edit-input { background: #101010; border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 4px 6px; font-size: 12px; font-family: var(--font); }
  .slot .slot-edit-row { display: flex; gap: 6px; align-items: center; }
  .slot .slot-edit-row input.slot-time-edit { width: 70px; }
  .slot .slot-edit-row input.slot-title-edit { flex: 1; }

  /* Markdown trong bubble AI */
  .bubble p { margin: 0; }
  .md-h { font-weight: 600; margin: 8px 0 4px; }
  .md-h1 { font-size: 16px; } .md-h2 { font-size: 15px; } .md-h3 { font-size: 14px; }
  .md-ul, .md-ol { margin: 4px 0; padding-left: 20px; }
  .md-ul { list-style: disc; } .md-ol { list-style: decimal; }
  .md-ul li, .md-ol li { margin: 2px 0; }
  .md-icode { background: #0a0a0a; border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: ui-monospace,Menlo,monospace; font-size: 12px; }
  .md-code { background: #0a0a0a; border: 1px solid var(--border); border-radius: 8px; padding: 10px; overflow-x: auto; margin: 6px 0; }
  .md-code code { font-family: ui-monospace,Menlo,monospace; font-size: 12px; white-space: pre; color: #d6e4ff; }
  .md-table { width: 100%; border-collapse: collapse; margin: 12px 0; overflow-x: auto; }
  .md-table.cols-3 { font-size: 13px; }
  .md-table.cols-5 { font-size: 10px; }
  .md-table.cols-6plus { font-size: 8px; }
  .md-table th, .md-table td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
  .md-table th { background: var(--surface); font-weight: 500; }
  .md-table tr:hover { background: rgba(79, 142, 247, 0.05); }
  .bubble a { color: var(--accent); }

  /* Trace (thinking + tool calls) */
  .trace { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .trace-wrap { margin-top: 8px; margin-bottom: 14px; background: #141414; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; }
  .trace-wrap > summary { cursor: pointer; padding: 6px 8px; list-style: none; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .trace-wrap > summary::-webkit-details-marker { display: none; }
  .trace-wrap > summary::before { content: '▸'; font-size: 10px; }
  .trace-wrap[open] > summary::before { content: '▾'; }
  .trace-wrap .trace { margin: 0 8px 8px; }
  .trace-thought { font-size: 12px; color: var(--muted); font-style: italic; background: #141414; border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; white-space: pre-wrap; }
  .trace-tool { background: #141414; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; }
  .trace-tool summary { cursor: pointer; padding: 6px 8px; list-style: none; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .trace-tool summary::-webkit-details-marker { display: none; }
  .trace-tool summary::before { content: '▸'; color: var(--muted); font-size: 10px; }
  .trace-tool[open] summary::before { content: '▾'; }
  .trace-args { color: var(--muted); font-family: ui-monospace,Menlo,monospace; font-size: 11px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
  .trace-result { margin: 0; padding: 8px; border-top: 1px solid var(--border); font-family: ui-monospace,Menlo,monospace; font-size: 11px; color: #b8e6c1; white-space: pre-wrap; word-break: break-word; max-height: 240px; overflow-y: auto; }

  @media (prefers-reduced-motion: reduce) {
    .typing span { animation: none; }
  }

  @supports (padding: max(0px)) {
    body { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
  }

  /* Settings modal */
  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  #settings-overlay.open { display: flex; }

  #settings-panel {
    background: #111;
    border: 1px solid #222;
    border-bottom: none;
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 680px;
    max-height: 92dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -8px 40px rgba(0,0,0,.5);
  }
  #settings-panel::-webkit-scrollbar { width: 4px; }
  #settings-panel::-webkit-scrollbar-track { background: transparent; }
  #settings-panel::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* Drag handle */
  .settings-handle {
    width: 40px; height: 4px;
    background: #2a2a2a;
    border-radius: 2px;
    margin: 14px auto 0;
    flex-shrink: 0;
  }

  /* Settings header */
  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 14px;
    flex-shrink: 0;
  }
  .settings-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.01em;
  }
  .settings-close-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    color: #888;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .2s;
    line-height: 1;
    -webkit-user-select: none; user-select: none;
  }
  .settings-close-btn:hover { background: #2a2a2a; color: var(--text); border-color: #383838; }

  /* Settings sections */
  .settings-section {
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .settings-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #555;
    padding: 0 4px;
    margin-bottom: 4px;
    margin-top: 4px;
  }

  .settings-divider {
    height: 1px;
    background: #1e1e1e;

function now() {
  return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
}

function formatDateTimeShort(value, opts) {
  if (!value) return '';
  const d = new Date(String(value).replace(' ', 'T'));
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleString('vi-VN', opts || { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function relativeTime(value) {
  if (!value) return '';
  const d = new Date(String(value).replace(' ', 'T'));
  if (Number.isNaN(d.getTime())) return String(value);
  const diff = Date.now() - d.getTime();
  const minute = 60 * 1000, hour = 60 * minute, day = 24 * hour, week = 7 * day;
  if (diff < minute) return 'vừa xong';
  if (diff < hour) return `${Math.floor(diff / minute)} phút trước`;
  if (diff < day) return `${Math.floor(diff / hour)} giờ trước`;
  if (diff < 2 * day) return 'hôm qua';
  if (diff < week) return `${Math.floor(diff / day)} ngày trước`;
  if (diff < 5 * week) return `${Math.floor(diff / week)} tuần trước`;
  return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

  const card = document.getElementById('sched-' + sid);
  const slots = collectSlotsFromCard(card);
  if (!slots.length) { showToast('Không có slot hợp lệ'); return; }
  try {
    const res = await fetch('/approve-morning', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: sid, slots })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      if (card) {
        card.querySelectorAll('.sched-actions').forEach(a => a.remove());
        const tag = document.createElement('div');
        tag.className = 'sched-approved';
        tag.textContent = `✓ Đã duyệt — tạo ${data.created} task` + (data.skipped ? `, bỏ ${data.skipped} (trùng/lỗi)` : '');

// ── Markdown renderer (nhỏ, inline, không dep) cho bubble AI ────────────
function _escapeRaw(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function _mdInline(t){
  t = _escapeRaw(t);
  t = t.replace(/`([^`\n]+)`/g, '<code class="md-icode">$1</code>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}

function parseMarkdownTable(src) {
  const lines = String(src).split('\n');
  const tableStart = lines.findIndex(l => l.includes('|'));
  if (tableStart === -1) return src;

  const tableLines = [];
  let i = tableStart;
  while (i < lines.length && lines[i].includes('|')) {
    tableLines.push(lines[i]);
    i++;
  }

  if (tableLines.length < 2) return src;

  const headerCells = tableLines[0].split('|').map(c => c.trim()).filter(c => c);
  const sepLine = tableLines[1];

  if (!/^[\s|:\-]+$/.test(sepLine)) return src;

  const colCount = headerCells.length;
  let colClass = 'cols-3';
  if (colCount <= 3) colClass = 'cols-3';
  else if (colCount <= 5) colClass = 'cols-5';
  else colClass = 'cols-6plus';

  let html = `<table class="md-table ${colClass}"><thead><tr>`;
  for (const h of headerCells) {
    html += '<th>' + _mdInline(h) + '</th>';
  }
  html += '</tr></thead><tbody>';

  for (let j = 2; j < tableLines.length; j++) {
    const rowCells = tableLines[j].split('|').map(c => c.trim()).filter(c => c);
    if (rowCells.length === 0) continue;
    html += '<tr>';
    for (const cell of rowCells) {
      html += '<td>' + _mdInline(cell) + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';

  const beforeTable = lines.slice(0, tableStart).join('\n');
  const afterTable = lines.slice(i).join('\n');
  return beforeTable + '\n' + html + '\n' + afterTable;
}

function renderMarkdown(src){
  if(!src) return '';
  src = parseMarkdownTable(src);
  // 1) tách code block ra placeholder (xử lý đa dòng nguyên khối)
  const blocks = [];
  let s = String(src).replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    blocks.push('<pre class="md-code"><code>' + _escapeRaw(code.replace(/\n$/, '')) + '</code></pre>');
    return '@@BLK' + (blocks.length - 1) + '@@';
  });
  // 2) xử lý từng dòng
  const lines = s.split('\n');
  let html = '', inUL = false, inOL = false;
  const closeLists = () => { if(inUL){ html += '</ul>'; inUL=false; } if(inOL){ html += '</ol>'; inOL=false; } };
  for(const line of lines){
    if(/^@@BLK\d+@@$/.test(line.trim())){ closeLists(); html += line.trim(); continue; }
    if(/^<table/.test(line.trim())){ closeLists(); html += line; continue; }
    if(/^<\/table>/.test(line.trim())){ html += line; continue; }
    if(/^<thead>|^<tbody>|^<\/thead>|^<\/tbody>|^<tr|^<\/tr|^<th|^<td/.test(line.trim())){ html += line; continue; }
    let m;
    if((m = line.match(/^(#{1,3})\s+(.*)/))){ closeLists(); const lvl=m[1].length; html += '<div class="md-h md-h'+lvl+'">'+_mdInline(m[2])+'</div>'; continue; }
    if((m = line.match(/^\s*[-*]\s+(.*)/))){ if(!inUL){ closeLists(); html+='<ul class="md-ul">'; inUL=true; } html += '<li>'+_mdInline(m[1])+'</li>'; continue; }
    if((m = line.match(/^\s*\d+\.\s+(.*)/))){ if(!inOL){ closeLists(); html+='<ol class="md-ol">'; inOL=true; } html += '<li>'+_mdInline(m[1])+'</li>'; continue; }
    if(line.trim()===''){ closeLists(); html += '<br>'; continue; }
    closeLists(); html += _mdInline(line) + '<br>';
  }
  closeLists();
  html = html.replace(/@@BLK(\d+)@@/g, (m,i) => blocks[+i]);
  return html;
}

// ── Trace: hiển thị thinking + tool calls (giống Claude/Codex) ───────────
function renderTrace(trace){
  if(!trace || !trace.length) return '';
  let html = '<details class="trace-wrap"><summary> REASONING &amp; TOOLS DETAILED</summary><div class="trace">';
  for(const s of trace){
    if(s.kind === 'thought' && s.text){
      html += '<div class="trace-thought">💭 ' + _escapeRaw(s.text) + '</div>';
    } else if(s.kind === 'tool'){
      const args = s.args ? (() => { try { return JSON.stringify(JSON.parse(s.args)); } catch(e){ return s.args; } })() : '';
      html += '<details class="trace-tool"><summary>🔧 <b>' + _escapeRaw(s.name) + '</b>'
              + (args ? '<span class="trace-args">' + _escapeRaw(args) + '</span>' : '') + '</summary>'
              + '<pre class="trace-result">' + _escapeRaw(s.result || '') + '</pre></details>';
    }
  }
  html += '</div></details>';
  return html;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isTyping) return;

  if (!isConfigured()) {
    openSettings();
    showToast('Vui lòng điền thông tin kết nối trước nhé');
    return;
  }

  const cfg = loadSettings();
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMessage('me', text);
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message:  text,
        api_key:  cfg.apiKey,
        base_url: cfg.baseUrl,
        model:    cfg.model,
      })
    });
    const data = await res.json();
    hideTyping();
    appendMessage('ai', data.reply || 'Xin lỗi, có lỗi xảy ra.',
      { schedule: data.schedule || null, trace: data.trace || null });
  } catch (err) {
    hideTyping();
    appendMessage('ai', '⚠️ Không kết nối được server. Thử lại nhé.');
  } finally {
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

  sendMessage();
}

// Trigger proactive job thủ công (morning plan / weekly / monthly review) — hiển thị trong chat.
async function triggerJob(job) {
  if (isTyping) return;
  if (!hasMessages) { showEmpty(false); hasMessages = true; }
  showTyping();
  try {
    const res = await fetch('/proactive/run', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job })
    });
    const data = await res.json();
    hideTyping();
    if (!res.ok || !data.ok) {
      let m = (data && data.error) ? data.error : 'lỗi không rõ';
      m = m.includes('API key')
        ? '⚙️ Chưa cài API key. Nhấn nút Cài đặt để điền thông tin rồi thử lại.'
        : '⚠️ Không chạy được: ' + m;
      appendMessage('ai', m);
      return;
    }
    const extra = {};
    if (job === 'morning_planning' && data.slots) {
      extra.schedule = { id: data.job_id, date: data.date || '', slots: data.slots };
    }
    appendMessage('ai', data.content || '(không có nội dung)', extra);
  } catch (e) {
    hideTyping();
    appendMessage('ai', '⚠️ Không kết nối được server. Thử lại nhé.');
  }
}

// ── Per-message actions (copy / edit / resend / regenerate) ─────────────
async function copyMsg(rowId) {
  const t = _msgText[rowId];
  if (!t) return;
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(t);
    } else {
      const ta = document.createElement('textarea');
      ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    showToast('Đã sao chép ✓');
  } catch (e) { showToast('Không sao chép được'); }
}

function editMsg(rowId) {
  const t = _msgText[rowId];
  if (!t) return;
  const input = document.getElementById('msg-input');
  input.value = t; autoResize(input); input.focus();
}

function resendMsg(rowId) {
  const t = _msgText[rowId];
  if (!t || isTyping) return;
  document.getElementById('msg-input').value = t;
  sendMessage();
}

function regenMsg(rowId) {
  const aiRow = document.getElementById(rowId);
  if (!aiRow || isTyping || !aiRow.classList.contains('can-regen')) return;
  // Tìm msg-row.me gần nhất phía trước (câu hỏi dẫn đến reply này).
  let prev = aiRow.previousElementSibling;
  while (prev && !(prev.classList.contains('me') && prev.id && _msgText[prev.id])) {
    prev = prev.previousElementSibling;
  }
  if (!prev) return;
  const t = _msgText[prev.id];
  aiRow.remove(); prev.remove();
  document.getElementById('msg-input').value = t;
  sendMessage();
}

// Đánh dấu can-regen cho đúng 1 row: AI reply cuối cùng (để regen không xáo trộn giữa history).
function _refreshLastAiRegen() {
  document.querySelectorAll('.msg-row.ai.can-regen').forEach(r => r.classList.remove('can-regen'));
  const rows = Array.from(document.querySelectorAll('#messages .msg-row:not(#typing-indicator)'));
  const last = rows[rows.length - 1];
  if (last && last.classList.contains('ai') && last.id && _msgText[last.id]) {
    last.classList.add('can-regen');
  }
}

// Push Notification
async function getVapidPublicKey() {
  if (window.VAPID_PUBLIC_KEY) return window.VAPID_PUBLIC_KEY;
  try {
    const res = await fetch('/vapid-public-key');
    const data = await res.json();
    window.VAPID_PUBLIC_KEY = data.publicKey || '';
  } catch (e) {
    console.log('Fetch VAPID public key error:', e);
    window.VAPID_PUBLIC_KEY = '';
  }
  return window.VAPID_PUBLIC_KEY;
}

// iOS: Web Push chỉ khả dụng khi app được "Add to Home Screen" (chế độ standalone)
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
}

async function toggleNotification() {
  if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) {
    showToast('Trình duyệt không hỗ trợ thông báo');
    return;
  }

  // iOS (Safari) chỉ cho push khi đã cài app ra màn hình
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) || /Mac/.test(navigator.platform);
  if (isIOS && !isStandalone()) {
    showToast('Cài app ra màn hình: Share → Add to Home Screen');
    return;
  }

  // Chưa có quyền → xin quyền (iOS bắt buộc từ cử chỉ người dùng)
  if (Notification.permission !== 'granted') {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      showToast('Bạn đã tắt thông báo trong trình duyệt');
      return;
    }
  }

  // Đã có quyền → đăng ký subscription. Chỉ bật nút xanh khi thành công.
  const ok = await subscribeToNotifications();
  if (ok) {
    setNotifBtn(true);
    showToast('Đã bật thông báo ✓');
  }
}

function setNotifBtn(on) {
  const headerBtn = document.getElementById('notif-btn');
  const btn = document.getElementById('settings-notification-toggle');
  const icon = document.getElementById('settings-notification-icon');
  const desc = document.getElementById('settings-notification-desc');
  if (headerBtn) headerBtn.classList.toggle('enabled', !!on);
  if (btn) btn.classList.toggle('enabled', !!on);
  if (icon) icon.innerHTML = on ? ICONS.bell : ICONS.bellOff;
  if (desc) desc.textContent = on ? 'Đã bật thông báo' : 'Chưa bật thông báo';
}

function refreshNotificationUi() {
  setNotifBtn('Notification' in window && Notification.permission === 'granted');
}

async function subscribeToNotifications() {
  const key = await getVapidPublicKey();
  if (!key) {
    showToast('Không lấy được VAPID key. Mở /debug-push trên server để kiểm tra.');
    return false;
  }
  try {
    swRegistration = await navigator.serviceWorker.ready;
    // Đã có subscription cũ → dùng lại thay vì tạo mới
    let subscription = await swRegistration.pushManager.getSubscription();
    if (!subscription) {
      subscription = await swRegistration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(key)
      });
    }
    const res = await fetch('/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(subscription)
    });
    if (!res.ok) throw new Error('server trả ' + res.status + ' khi đăng ký');
    return true;
  } catch (e) {
    console.log('Push subscription error:', e);
    const msg = String(e && e.message || e);
    showToast('Đăng ký thất bại: ' + msg);
    return false;
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return new Uint8Array([...rawData].map(c => c.charCodeAt(0)));
}

// Register service worker + đảm bảo subscribe lại nếu đã được cấp quyền từ trước
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(async reg => {
    swRegistration = reg;
    if (Notification.permission === 'granted' && isStandalone()) {
      // Chỉ bật nút xanh khi đăng ký subscription thành công
      const ok = await subscribeToNotifications();
      if (ok) setNotifBtn(true);
    }
  });
}

// Tải lịch sử chat từ server (SQLite) khi mở app — không mất khi restart.
async function loadHistory() {
  try {
    const res = await fetch('/history');
    const data = await res.json();
    const items = data.items || [];
    if (!items.length) return;
    showEmpty(false); hasMessages = true;
    for (const it of items) {
      const role = it.role === 'assistant' ? 'ai' : 'me';
      let time = '', ts = 0;
      try {
        const d = new Date(String(it.created_at || '').replace(' ', 'T'));
        if (!isNaN(d.getTime())) { ts = d.getTime(); time = d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }); }
      } catch (e) {}
      const extra = {};
      if (time) extra.time = time;
      if (ts) extra.ts = ts;
      if (Array.isArray(it.trace) && it.trace.length) extra.trace = it.trace;
      appendMessage(role, it.content || '', extra);
    }
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  } catch (e) {
    console.log('loadHistory error:', e);
  }
}

// Tải lịch sử xong rồi mới tải pending — tránh race làm pending nhảy lên trên history.
(async () => {
  await loadHistory();
  await loadPending();
  _refreshLastAiRegen();
})();

// ── Settings ──────────────────────────────────────────────────────────
function loadSettings() {
  return {
    baseUrl: localStorage.getItem('cfg_baseurl') || '',
    apiKey:  localStorage.getItem('cfg_apikey')  || '',
    model:   localStorage.getItem('cfg_model')   || '',
  };
}

function isConfigured() {
  const c = loadSettings();
  return c.apiKey.trim() !== '';
}

function openSettings() {
  const c = loadSettings();
  document.getElementById('cfg-baseurl').value = c.baseUrl;
  document.getElementById('cfg-apikey').value  = c.apiKey;
  document.getElementById('cfg-model').value   = c.model;
  document.getElementById('settings-overlay').classList.add('open');
  refreshNotificationUi();
}

function closeSettings() {
  closeSettingsData();
  document.getElementById('settings-overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
}

async function saveSettings() {
  const baseUrl = document.getElementById('cfg-baseurl').value.trim();
  const apiKey  = document.getElementById('cfg-apikey').value.trim();
  const model   = document.getElementById('cfg-model').value.trim();

  if (!apiKey) { showToast('Vui lòng nhập API Key'); return; }

  localStorage.setItem('cfg_baseurl', baseUrl);
  localStorage.setItem('cfg_apikey',  apiKey);
  localStorage.setItem('cfg_model',   model);

  document.getElementById('settings-btn')?.classList.add('configured');
  showToast('Đã lưu cài đặt ✓');
  closeSettings();
}

async function loadServerConfig(show = true) {
  try {
    const res = await fetch('/config');
    if (!res.ok) throw new Error('server trả ' + res.status);
    const data = await res.json();
    if (data.base_url) {
      localStorage.setItem('cfg_baseurl', data.base_url);
      const el = document.getElementById('cfg-baseurl'); if (el) el.value = data.base_url;
    }
    if (data.model) {
      localStorage.setItem('cfg_model', data.model);
      const el = document.getElementById('cfg-model'); if (el) el.value = data.model;
    }
    if (show) showToast('Đã tải config từ server. API Key cần nhập trên thiết bị này.');
  } catch (e) {
    console.log('loadServerConfig error:', e);
    if (show) showToast('Không tải được config server');
  }
}

async function checkConfigOnStart() {
  if (isConfigured()) {
    document.getElementById('settings-btn')?.classList.add('configured');
  }
}
checkConfigOnStart();

function closeSettingsData(kind) {
  const boxes = kind
    ? [document.getElementById(`settings-data-view-${kind}`)]
    : Array.from(document.querySelectorAll('.settings-data-view'));
  boxes.filter(Boolean).forEach(box => {
    box.classList.remove('open');
    box.innerHTML = '';
    box.closest('.settings-inline-data')?.classList.remove('open');
  });

  if (kind) setDataButtonOpen(kind, false);
  else document.querySelectorAll('[data-settings-kind]').forEach(btn => btn.classList.remove('data-active'));
}

function setDataButtonOpen(kind, open) {
  const btn = document.querySelector(`[data-settings-kind="${kind}"]`);
  if (btn) btn.classList.toggle('data-active', open);
}

function dataBox(kind) {
  return document.getElementById(`settings-data-view-${kind}`);
}

function renderDataHead(title, count, kind) {
  return `<div class="settings-data-head"><span>${escapeHtml(title)} (${count})</span><button class="settings-data-close" onclick="closeSettingsData('${kind}')" type="button" aria-label="Đóng">×</button></div>`;
}

function taskPriorityClass(priority) {
  const p = Number(priority || 3);
  if (p <= 1) return 'p1';
  if (p === 2) return 'p2';
  return 'p3';
}

function renderTaskGroup(title, items, editable) {
  if (!items.length) return '';
  let html = `<div class="task-section-title">${escapeHtml(title)} (${items.length})</div>`;
  html += items.map(it => {
    const done = it.status === 'done';
    const due = it.due_at ? formatDateTimeShort(it.due_at, { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
    const notes = it.notes || it.note || '';
    const prio = Number(it.priority || 3);
    const actions = editable ? `
      <div class="task-actions">
        <button class="mini-act-btn" onclick="toggleTask(${it.id}, '${it.status}')">${done ? '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:3px"><path d="M2 7a5 5 0 1 0 1.5-3.5"/><path d="M2 3v3h3"/></svg>Mở lại' : '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:3px"><path d="M2 7l3.5 3.5L12 3.5"/></svg>Xong'}</button>
        <button class="mini-act-btn" onclick="editTaskInline(${it.id})"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:3px"><path d="M9.5 2.5l2 2L5 11H3v-2L9.5 2.5z"/></svg>Sửa</button>
        <button class="mini-act-btn danger" onclick="deleteTask(${it.id})"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:3px"><path d="M2 4h10M5 4V3h4v1M5.5 6v5M8.5 6v5"/><path d="M3 4l.5 8h7L11 4"/></svg>Xoá</button>
      </div>` : '';
    return `<div class="task-item ${done ? 'done' : ''}" id="task-row-${it.id}" data-task='${JSON.stringify(taskPlain(it)).replace(/'/g,"&#39;")}'>
      <span class="task-priority ${taskPriorityClass(prio)}">P${prio}</span>
      <div class="task-main">
        <div class="task-meta-row">
          <span class="task-status-badge ${done ? 'done' : 'open'}">${done ? 'Đã xong' : 'Đang mở'}</span>
          ${due ? `<span class="task-due">Hạn ${escapeHtml(due)}</span>` : ''}
        </div>
        <div class="task-title">${escapeHtml(it.title || '')}</div>
        ${notes ? `<div class="task-notes">${escapeHtml(notes)}</div>` : ''}
        ${actions}
      </div>
    </div>`;
  }).join('');
  return html;
}

function taskPlain(it) {
  return { id: it.id, title: it.title || '', notes: it.notes || '', status: it.status || 'pending',
           priority: Number(it.priority || 3), due_at: it.due_at || '', remind_at: it.remind_at || '',
           start_at: it.start_at || '' };
}

function renderTaskItems(items, editable) {
  const open = items.filter(it => it.status !== 'done');
  const done = items.filter(it => it.status === 'done');
  return renderTaskGroup('Đang mở', open, editable) + renderTaskGroup('Đã xong', done, editable);
}

function memoryTypeLabel(type) {
  const map = { fact: 'Sự thật', preference: 'Sở thích', journal: 'Nhật ký', note: 'Ghi chú' };
  return map[type] || type || 'Ghi nhớ';
}

function renderImportance(value) {
  const n = Math.max(1, Math.min(5, Number(value || 1)));
  return '●'.repeat(n) + '○'.repeat(5 - n);
}

function memoryTypeClass(type) {
  const t = String(type || 'note').toLowerCase();
  return ['fact', 'preference', 'journal', 'note'].includes(t) ? t : 'note';
}

function renderMemoryItems(items, editable) {
  return items.map(it => {
    const type = String(it.type || 'note').toLowerCase();
    const imp = Number(it.importance || 1);
    const actions = editable ? `
      <div class="mem-actions">
        <button class="mini-act-btn" onclick="editMemoryInline(${it.id})"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:3px"><path d="M9.5 2.5l2 2L5 11H3v-2L9.5 2.5z"/></svg>Sửa</button>
        <button class="mini-act-btn danger" onclick="deleteMemory(${it.id})"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:3px"><path d="M2 4h10M5 4V3h4v1M5.5 6v5M8.5 6v5"/><path d="M3 4l.5 8h7L11 4"/></svg>Xoá</button>
      </div>` : '';
    return `<div class="mem-item" id="mem-row-${it.id}" data-mem='${JSON.stringify({id:it.id,content:it.content||'',type,importance:imp}).replace(/'/g,"&#39;")}'>
      <div class="mem-meta-row">
        <span class="mem-type-badge ${memoryTypeClass(type)}">${escapeHtml(memoryTypeLabel(type))}</span>
        <span class="mem-importance" title="Độ quan trọng ${escapeHtml(String(imp))}/5">${renderImportance(imp)}</span>
        <span class="mem-time">${escapeHtml(relativeTime(it.created_at || ''))}</span>
      </div>
      <div class="mem-content">${escapeHtml(it.content || '')}</div>
      ${actions}
    </div>`;
  }).join('');
}

function renderSettingsData(kind, items) {
  const box = dataBox(kind);
  if (!box) return;
  const title = kind === 'tasks' ? 'Tasks' : 'Memories';
  let html = renderDataHead(title, items.length, kind);
  if (kind === 'tasks') {
    html += renderTaskAddForm();
    html += items.length ? renderTaskItems(items, true) : '<div class="settings-data-empty">Chưa có task nào.</div>';
  } else if (kind === 'memories') {
    html += renderMemoryAddForm();
    html += items.length ? renderMemoryItems(items, true) : '<div class="settings-data-empty">Chưa có ghi nhớ nào.</div>';
  } else {
    html += '<div class="settings-data-empty">Chưa có dữ liệu.</div>';
  }
  box.innerHTML = html;
  box.classList.add('open');
  box.closest('.settings-inline-data')?.classList.add('open');
}

async function showSettingsData(kind) {
  // Toggle: đang mở thì đóng, chưa mở thì tải + mở.
  const box = dataBox(kind);
  if (box?.classList.contains('open')) {
    closeSettingsData(kind);
    return;
  }
  await refreshSettingsData(kind);
}

// Tải lại + render dữ liệu trong Settings mà KHÔNG đóng panel — dùng sau khi CRUD
// (thêm/sửa/xoá task hoặc memory) để làm mới danh sách, giữ nguyên trạng thái đang mở.
async function refreshSettingsData(kind) {
  const box = dataBox(kind);
  setDataButtonOpen(kind, true);
  if (box) {
    box.innerHTML = '<div class="settings-data-empty">Đang tải...</div>';
    box.classList.add('open');
    box.closest('.settings-inline-data')?.classList.add('open');
  }
  const url = kind === 'tasks' ? '/tasks?status=all' : '/memories?limit=50';
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ('server trả ' + res.status));
    renderSettingsData(kind, data.items || []);
  } catch (e) {
    console.log('refreshSettingsData error:', e);
    if (box) box.innerHTML = `<div class="settings-data-head"><span>Lỗi</span><button class="settings-data-close" onclick="closeSettingsData('${kind}')" type="button" aria-label="Đóng">×</button></div><div class="settings-data-empty">Không tải được dữ liệu.</div>`;
    showToast('Không tải được dữ liệu');
  }
}

// ── Helpers datetime-local ↔ backend "YYYY-MM-DD HH:MM" ─────────────────
function dtLocalToBackend(v) { return (v || '').replace('T', ' '); }
function backendToDtLocal(v) {
  if (!v) return '';
  const s = String(v).replace(' ', 'T');
  return s.length >= 16 ? s.slice(0, 16) : s;
}

        <select id="task-add-priority">

async function addTask() {
  const title = document.getElementById('task-add-title').value.trim();
  if (!title) { showToast('Nhập tên việc'); return; }
  const body = {
    title,
    priority: parseInt(document.getElementById('task-add-priority').value, 10) || 3,
    due_at: dtLocalToBackend(document.getElementById('task-add-due').value),
    remind_at: dtLocalToBackend(document.getElementById('task-add-remind').value),
  };
  try {
    const res = await fetch('/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) throw new Error('server');
    showToast('Đã thêm task ✓');
    refreshSettingsData('tasks');
  } catch (e) { showToast('Lỗi thêm task'); }
}

async function toggleTask(id, status) {
  try {
    if (status === 'done') {
      const res = await fetch(`/tasks/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'pending' }) });
      if (!res.ok) throw new Error('server');
      showToast('Đã mở lại task');
    } else {
      const res = await fetch(`/tasks/${id}/complete`, { method: 'POST' });
      if (!res.ok) throw new Error('server');
      showToast('Đã đánh dấu xong ✓');
    }
    refreshSettingsData('tasks');
  } catch (e) { showToast('Lỗi cập nhật task'); }
}

async function saveTaskInline(id) {
  const body = {
    title: document.getElementById(`tk-edit-title-${id}`).value.trim(),
    notes: document.getElementById(`tk-edit-notes-${id}`).value,
    priority: parseInt(document.getElementById(`tk-edit-prio-${id}`).value, 10),
    due_at: dtLocalToBackend(document.getElementById(`tk-edit-due-${id}`).value),
    remind_at: dtLocalToBackend(document.getElementById(`tk-edit-remind-${id}`).value),
  };
  if (!body.title) { showToast('Tên việc không được trống'); return; }
  try {
    const res = await fetch(`/tasks/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) throw new Error('server');
    showToast('Đã lưu ✓');
    refreshSettingsData('tasks');
  } catch (e) { showToast('Lỗi lưu task'); }
}

    const res = await fetch(`/tasks/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('server');
    showToast('Đã xoá task');

}

// Reset đoạn chat: xoá lịch sử trên server + xoá tin nhắn trên màn hình.
async function resetChat() {
  const btn = document.getElementById('settings-reset-chat');
  if (!confirm('Xoá toàn bộ đoạn chat? Hành động không thể hoàn tác.')) return;
  btn.disabled = true;
  try {
    const res = await fetch('/reset-chat', { method: 'POST' });
    if (res.ok) {
      document.querySelectorAll('#messages .msg-row').forEach(el => el.remove());
      hasMessages = false;
      showEmpty(true);
      closeSettings();
      showToast('Đã xoá đoạn chat ✓');
    } else {
      showToast('Xoá thất bại');
    }
  } catch (e) {
    console.log('resetChat error:', e);
    showToast('Không kết nối được server');
  } finally {
    btn.disabled = false;
  }
}

// ── Pending reports (proactive reviews/planning) ───────────────────────
const PENDING_LABEL = {
  morning_planning: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:4px"><rect x="1" y="2" width="12" height="10" rx="1.5"/><path d="M4 2V1M10 2V1M1 6h12"/><path d="M4 9h2M7.5 9h2"/></svg>Lịch ngày',
  daily_review: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:4px"><path d="M3 1h8a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z"/><path d="M4 5h6M4 7.5h4M4 10h2"/></svg>Tổng kết ngày',
  weekly_review: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:4px"><rect x="1" y="2" width="12" height="10" rx="1.5"/><path d="M4 2V1M10 2V1M1 6h12"/><path d="M4 9h1M6.5 9h1M9 9h1"/></svg>Tổng kết tuần',
  monthly_review: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:-1px;margin-right:4px"><rect x="1" y="2" width="12" height="10" rx="1.5"/><path d="M4 2V1M10 2V1M1 6h12"/><path d="M4 9h1M6.5 9h1M9 9h1M4 11.5h1M6.5 11.5h1"/></svg>Tổng kết tháng',
};

async function loadPending() {
  try {
    const res = await fetch('/pending');
    const data = await res.json();
    const items = data.items || [];
    if (!items.length) return;
    showEmpty(false); hasMessages = true;
    items.reverse().forEach(it => renderPending(it));
  } catch (e) {
    console.log('loadPending error:', e);

  }
}

function renderPending(it) {
  // Daily review interactive → form hardcode (không phải card text).
  if (it.type === 'daily_review' && it.interactive) {
    renderReviewForm(it);
    return;
  }
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.dataset.pendingId = it.id;
  const ts = parseTs(it.created_at);
  row.dataset.ts = ts || Date.now();
  const label = PENDING_LABEL[it.type] || 'Thư ký Kim';
  let inner = `<div class="pending-card">
    <div class="pending-head">${label} ${escapeHtml(it.period || '')}</div>
    <div class="pending-body">${renderMarkdown(it.content || '')}</div>`;
  // Nếu là morning_planning có slots → render schedule card (chưa duyệt).
  if (it.type === 'morning_planning' && it.schedule_id && it.schedule_slots) {
    inner += renderScheduleCard({id: it.schedule_id, date: it.period, slots: it.schedule_slots});
  }
  inner += `<div><button class="pending-dismiss" onclick="dismissPending(${it.id})">Đã xem</button></div></div>`;
  row.innerHTML = `
    <div class="msg-avatar"><img src="/static/icon.jpg" alt="Kim" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
    <div><div class="bubble">${inner}</div><div class="msg-time">${ts ? fmtTime(ts) : now()}</div></div>`;
  insertRowByTime(msgs, row, row.dataset.ts);
  msgs.scrollTop = msgs.scrollHeight;
}

async function renderReviewForm(it) {
  // it có thể có _data (mở từ chip) hoặc cần fetch.
  let data = it._data;
  if (!data) {
    try {
      const res = await fetch('/daily-review/today');
      data = await res.json();
    } catch (e) { showToast('Không tải được tasks hôm nay'); return; }
  }
  const jobId = it.id != null ? it.id : data.job_id;
  const date = data.date || it.period || '';
  const pending = data.pending_today || [];
  const done = data.done_today || [];

  if (!hasMessages) { showEmpty(false); hasMessages = true; }
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  if (jobId != null) row.dataset.pendingId = jobId;
  const ts = parseTs(it.created_at) || Date.now();
  row.dataset.ts = ts;

  const pendHtml = pending.map(t =>
    `<label class="review-task"><input type="checkbox" value="${t.id}"><span class="review-task-text">${escapeHtml(t.title)}</span></label>`).join('');
  const doneHtml = done.map(t =>
    `<label class="review-task done"><input type="checkbox" checked disabled><span class="review-task-text">${escapeHtml(t.title)}</span></label>`).join('');

  row.innerHTML = `
    <div class="msg-avatar"><img src="/static/icon.jpg" alt="Kim" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
    <div><div class="bubble">
      <div class="review-form">
        <div class="review-head">Tổng kết ngày ${escapeHtml(date)}</div>
        <div class="review-greet">Chào bạn, tổng kết nhanh hôm nay nhé? Tick các việc đã xong:</div>
        <div class="review-checklist">${pendHtml}${doneHtml || '<div class="review-task done"><span class="review-task-text">Chưa có việc nào hôm nay</span></div>'}</div>
        <textarea class="review-other" placeholder="Việc khác đã làm hôm nay (tuỳ chọn)..."></textarea>
        <button class="review-submit" onclick="submitReview(${jobId == null ? 'null' : jobId})">Ghi nhận</button>
      </div>
    </div><div class="msg-time">${ts ? fmtTime(ts) : now()}</div></div>`;
  insertRowByTime(msgs, row, ts);
  msgs.scrollTop = msgs.scrollHeight;
}

async function submitReview(jobId) {
  const row = jobId != null
    ? document.querySelector(`[data-pending-id="${jobId}"]`)
    : document.querySelector('.review-form')?.closest('.msg-row');
  if (!row) return;
  const completed = Array.from(row.querySelectorAll('.review-checklist input[type=checkbox]:not([disabled]):checked'))
    .map(cb => parseInt(cb.value, 10));
  const other = (row.querySelector('.review-other')?.value || '').trim();
  // Ẩn form ngay + hiện typing (LLM tổng kết mất vài giây).
  row.remove();
  if (!hasMessages) { showEmpty(false); hasMessages = true; }
  showTyping();
  try {
    const res = await fetch('/daily-review/submit', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: jobId, completed_task_ids: completed, other_done: other })
    });
    const data = await res.json();
    hideTyping();
    if (!res.ok) throw new Error(data.error || 'server');
    appendMessage('ai', data.text || 'Đã ghi nhận tổng kết.');
    showToast('Đã ghi nhận tổng kết ✓');
  } catch (e) {
    hideTyping();
    showToast('Lỗi ghi nhận tổng kết');
  }
}

async function openDailyReview() {
  try {
    const res = await fetch('/daily-review/today');
    const data = await res.json();
    renderReviewForm({ id: data.job_id, interactive: true, period: data.date, _data: data });
  } catch (e) {
    showToast('Không tải được tổng kết');
  }
}

async function dismissPending(id) {
  try {
    await fetch('/pending/read', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    const el = document.querySelector(`[data-pending-id="${id}"]`);
    if (el) el.remove();
  } catch (e) { console.log('dismiss error:', e); }
}

// Keep-alive: ping server mỗi 5 phút để không bị tắt
setInterval(() => {
  fetch('/ping').catch(() => {})
}, 300000)

// Ẩn quick-actions khi bàn phím bật (mobile)
if (window.visualViewport) {
  let _vpHeight = window.visualViewport.height;
  window.visualViewport.addEventListener('resize', () => {
    const qa = document.getElementById('quick-actions');
    if (!qa) return;
    const shrunk = window.visualViewport.height < _vpHeight * 0.85;
    qa.classList.toggle('kb-hidden', shrunk);
  });
}
